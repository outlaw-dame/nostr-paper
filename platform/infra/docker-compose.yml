services:
  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nostr
      POSTGRES_PASSWORD: nostr
      POSTGRES_DB: nostr_search
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostr -d nostr_search"]
      interval: 10s
      timeout: 5s
      retries: 10

  strfry:
    image: ghcr.io/hoytech/strfry:latest
    command: ["relay", "/etc/strfry.conf"]
    ports:
      - "${STRFRY_PORT:-7777}:7777"
    volumes:
      - ./strfry.conf/strfry.conf:/etc/strfry.conf:ro
      - strfry_data:/app/strfry-db

  bridge:
    build: ../services/ingestion-bridge
    environment:
      STRFRY_URL: ws://strfry:7777
      TAGR_RELAY_URL: ${TAGR_RELAY_URL:-wss://relay.nos.social}
      TAGR_BOT_PUBKEY: ${TAGR_BOT_PUBKEY:-56d4b3d6310fadb7294b7f041aab469c5ffc8991b1b1b331981b96a246f6ae65}
      REDIS_URL: redis://redis:6379
      REDIS_STREAM: events.ingest
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      strfry:
        condition: service_started

  lexical-worker:
    build: ../services/workers/lexical-index
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://nostr:nostr@postgres:5432/nostr_search
      TAGR_BOT_PUBKEY: ${TAGR_BOT_PUBKEY:-56d4b3d6310fadb7294b7f041aab469c5ffc8991b1b1b331981b96a246f6ae65}
      REDIS_STREAM: events.ingest
      EMBED_STREAM: events.embed
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  embedding-worker:
    build: ../services/workers/embedding
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgres://nostr:nostr@postgres:5432/nostr_search
      EMBED_STREAM: events.embed
      LOG_LEVEL: info
      EMBEDDING_MODEL_ID: Xenova/all-MiniLM-L6-v2
      EMBEDDING_VERSION: 1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  search:
    build: ../services/search-api
    environment:
      POSTGRES_URL: postgres://nostr:nostr@postgres:5432/nostr_search
      PORT: 3001
      LOG_LEVEL: info
      EMBEDDING_MODEL_ID: Xenova/all-MiniLM-L6-v2
      EMBEDDING_VERSION: 1
    ports:
      - "${SEARCH_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  strfry_data:
