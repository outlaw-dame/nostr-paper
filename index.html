<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Nostr Paper</title>
    <meta name="description"
          content="A local-first, decentralized social reader built on Nostr" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f4f0e8" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"
          content="default" />
    <meta name="apple-mobile-web-app-title" content="Paper" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32"
          href="/icons/favicon-32x32.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect to common relay domains for faster first connect -->
    <link rel="preconnect" href="https://relay.damus.io" crossorigin />

    <!--
      COI Service Worker (injected by coi-serviceworker at runtime)
      Provides COOP/COEP headers needed for SharedArrayBuffer + OPFS.
      Skip localhost because many third-party Nostr media hosts do not send
      the headers required by cross-origin isolation.
    -->
    <script>
      (() => {
        const hostname = window.location.hostname
        const isLocalHost =
          hostname === 'localhost' ||
          hostname === '::1' ||
          hostname === '[::1]' ||
          /^127(?:\.\d{1,3}){3}$/.test(hostname)

        if (isLocalHost) return

        const script = document.createElement('script')
        script.src = '/node_modules/coi-serviceworker/coi-serviceworker.js'
        script.defer = true
        document.head.appendChild(script)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
